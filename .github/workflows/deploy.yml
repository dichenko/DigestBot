name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat > .env << 'ENVEOF'
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_USER_SESSION=user_session
          OWNER_TELEGRAM_ID=${{ secrets.OWNER_TELEGRAM_ID }}
          DATABASE_URL=postgresql+asyncpg://news_filter_user:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/news_filter_bot
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          LLM_PROVIDER=deepseek
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
          MONITOR_INTERVAL_MINUTES=5
          DEFAULT_SCORE_THRESHOLD=70
          TIMEZONE=Europe/Moscow
          MAX_POSTS_PER_CHANNEL_PER_RUN=20
          MIN_POST_LENGTH=80
          ENABLE_DEBUG_SCORING=true
          ENVEOF

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: /opt/digest_bot
          EXCLUDE: "data/*.db,*.session,*.session-journal,.git,.github,.gitignore,.env.example,setup.bat,setup_session.py,deploy.sh,deploy_key,deploy_key.pub,posts_report.html,query_html.py"
          SCRIPT_AFTER: |
            cd /opt/digest_bot
            docker compose down --remove-orphans
            docker compose up -d --build
            docker image prune -f
            docker compose ps
